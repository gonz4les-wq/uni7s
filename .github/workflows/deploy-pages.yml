name: Deploy to GitHub Pages

# Builds the app and publishes the static output to the `gh-pages` branch.
# In repo Settings → Pages, set Source to "Deploy from a branch" → gh-pages / root.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run icons
      # GitHub Pages serves from /<repo>/, so set the base path accordingly.
      - run: npm run build
        env:
          BASE_PATH: /${{ github.event.repository.name }}/
      # SPA fallback so client-side routes work on refresh, plus .nojekyll.
      - run: cp dist/index.html dist/404.html && touch dist/.nojekyll
      - name: Publish to gh-pages branch
        run: |
          cd dist
          git init -q
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -qm "Deploy ${{ github.sha }}"
          git push -f \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" \
            HEAD:gh-pages
